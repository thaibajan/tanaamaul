<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Wellside – Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:transparent;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;padding:16px;
  -webkit-font-smoothing:antialiased;
}



/* ── Phone Frame ── */
.phone{
  --r:50px;--pad:11px;
  position:relative;width:390px;height:844px;flex-shrink:0;
  background:#000;border-radius:var(--r);padding:var(--pad);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.05),
    0 2px 4px rgba(0,0,0,.4),
    0 24px 68px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.03);
  z-index:2;
}
/* Dynamic island */
.phone::before{
  content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);
  width:126px;height:35px;background:#000;border-radius:20px;z-index:300;
}
/* Side buttons */
.phone::after{
  content:'';position:absolute;right:-3px;top:170px;
  width:3px;height:56px;background:#1a1a1a;border-radius:0 2px 2px 0;
}

.viewport{
  position:relative;width:100%;height:100%;
  border-radius:calc(var(--r) - var(--pad));overflow:hidden;
  background:#eef3ec;
}

/* ── Screen Panels ── */
.pan{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  will-change:transform,opacity;
  pointer-events:none;opacity:0;
  transform:translateX(100%);
}
.pan::-webkit-scrollbar{display:none}
.pan img{
  display:block;width:100%;height:auto;
  pointer-events:none;user-select:none;-webkit-user-drag:none;
}
/* Spacer at bottom for tab bar */
.pan-pad{height:84px;flex-shrink:0}

/* States */
.pan.live{transform:translateX(0);opacity:1;z-index:5;pointer-events:auto}
.pan.go{transition:transform .42s cubic-bezier(.36,.73,.08,1),opacity .38s ease}
.pan.out-l{transform:translateX(-32%);opacity:0;z-index:4}
.pan.out-r{transform:translateX(100%);opacity:0;z-index:4}

/* ── Tab Bar ── */
.tbar{
  position:absolute;bottom:0;left:0;right:0;height:84px;
  display:flex;align-items:flex-start;justify-content:space-around;
  padding:10px 4px 26px;
  background:linear-gradient(180deg,rgba(241,246,239,.85) 0%,rgba(244,248,242,.97) 40%);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(0,0,0,.04);
  z-index:200;
  transition:transform .35s cubic-bezier(.36,.73,.08,1);
}
.tbar.away{transform:translateY(100%)}

.tab{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 10px;border-radius:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;user-select:none;
  transition:transform .12s ease;
}
.tab:active{transform:scale(.88)}
.tab svg{
  width:22px;height:22px;fill:none;
  stroke:#9caa9c;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke .2s ease;
}
.tab .tl{font-size:10px;font-weight:500;color:#9caa9c;transition:color .2s ease;white-space:nowrap}
.tab.on svg{stroke:#17616e}
.tab.on .tl{color:#17616e;font-weight:600}

/* ── Hotspots ── */
.hs{
  position:absolute;cursor:pointer;z-index:30;border-radius:6px;
  -webkit-tap-highlight-color:transparent;
}
.hs:active{background:rgba(23,97,110,.08)}
/* Uncomment to debug: */
/* .hs{background:rgba(255,0,100,.15) !important} */



/* ── Responsive ── */
@media(max-width:440px){
  body{padding:0;justify-content:flex-start}
  .hdr,.crumb{display:none}
  .phone{width:100vw;height:100vh;height:100dvh;border-radius:0;padding:0;box-shadow:none;--r:0px;--pad:0px}
  .phone::before,.phone::after{display:none}
  .viewport{border-radius:0}
}
@media(min-width:441px)and(max-height:920px){.phone{height:760px;--r:46px}}
@media(min-width:441px)and(max-height:800px){.phone{height:680px;--r:42px}}
</style>
</head>
<body>

<div class="phone">
  <div class="viewport" id="vp">
    <div id="panels"></div>

    <div class="tbar" id="tbar">
      <div class="tab on" data-t="home" onclick="goTab('home')">
        <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V13h6v8"/></svg>
        <div class="tl">Home</div>
      </div>
      <div class="tab" data-t="checkin" onclick="goTab('checkin')">
        <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 7l2 2 4-4"/><path d="M9 13h6M9 17h4"/></svg>
        <div class="tl">Check-in</div>
      </div>
      <div class="tab" data-t="habits" onclick="goTab('habits')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <div class="tl">Habits</div>
      </div>
      <div class="tab" data-t="roadmap" onclick="goTab('roadmap')">
        <svg viewBox="0 0 24 24"><path d="M3 6h4v14H3zM10 4h4v16h-4zM17 8h4v12h-4z"/></svg>
        <div class="tl">Roadmap</div>
      </div>
      <div class="tab" data-t="insights" onclick="goTab('insights')">
        <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <div class="tl">Insights</div>
      </div>
    </div>
  </div>
</div>



<script>
/*═══════════════════════════════════════════════════════════════
  SCREEN DEFINITIONS
═══════════════════════════════════════════════════════════════*/
const SCREENS = {
  home:     { tab:'home',    label:'Home',              root:true,  imgKey:'a' },
  checkin:  { tab:'checkin', label:'Weekly Check-in',   root:true,  imgKey:'b' },
  habits:   { tab:'habits',  label:'Habits',            root:true,  imgKey:'i' },
  roadmap:  { tab:'roadmap', label:'Roadmap',           root:true,  imgKey:'k' },
  insights: { tab:'insights',label:'Insights',          root:true,  imgKey:'l' },

  // Check-in flow
  ck_sleep1:   { tab:'checkin', label:'Sleep Frequency',    parent:'checkin',    imgKey:'c' },
  ck_sleep2:   { tab:'checkin', label:'Sleep Quality',      parent:'ck_sleep1',  imgKey:'d' },
  ck_digest:   { tab:'checkin', label:'Digestive Issues',   parent:'ck_sleep2',  imgKey:'e' },
  ck_bloat:    { tab:'checkin', label:'Bloating',           parent:'ck_digest',  imgKey:'f' },
  ck_crave:    { tab:'checkin', label:'Cravings',           parent:'ck_bloat',   imgKey:'g' },
  ck_done:     { tab:'checkin', label:'Complete',           parent:'ck_crave',   imgKey:'h' },

  // Nutrition (sub of home — note: j.png has its own tab bar showing "Nutrition" tab)
  nutrition: { tab:'home', label:'Nutrition', parent:'home', imgKey:'j' },

  // Insights drilldowns
  metabolic: { tab:'insights', label:'Metabolic Health',  parent:'insights', imgKey:'m' },
  ldl:       { tab:'insights', label:'LDL Cholesterol',   parent:'insights', imgKey:'n' },
};

/*═══════════════════════════════════════════════════════════════
  HOTSPOT DEFINITIONS
  [screenId, x%, y%, w%, h%, targetId]
  Percentages relative to the image natural size.
═══════════════════════════════════════════════════════════════*/
const HOTSPOTS = [
  // ── HOME (a.png 371×2000) ──
  // "See all →" next to Habits section heading (~y=680px/2000 = 34%)
  ['home',  68, 33.5, 30, 2.2, 'habits'],

  // ── CHECK-IN INTRO (b.png 390×844) ──
  // "Let's Go" button (~y=540px/844 = 64%)
  ['checkin', 5, 62.5, 90, 7, 'ck_sleep1'],
  // X close button (top-left ~y=45px)
  ['checkin', 0, 3.5, 14, 5, 'home'],

  // ── CK_SLEEP1 (c.png 390×844) ──
  // "Next" button (~y=790px/844 = 93.6%)
  ['ck_sleep1', 4, 92, 92, 6, 'ck_sleep2'],
  // Back arrow
  ['ck_sleep1', 0, 4, 14, 5, 'checkin'],

  // ── CK_SLEEP2 (d.png 390×1101) ──
  // "Next" (~y=1040px/1101 = 94.5%)
  ['ck_sleep2', 4, 88, 92, 6, 'ck_digest'],
  // Back
  ['ck_sleep2', 0, 3, 14, 4, 'ck_sleep1'],

  // ── CK_DIGEST (e.png 390×844) ──
  // "Next" (~y=730px/844 = 86.5%)
  ['ck_digest', 4, 85, 92, 7.5, 'ck_bloat'],
  // Back
  ['ck_digest', 0, 4, 14, 5, 'ck_sleep2'],

  // ── CK_BLOAT (f.png 390×844) ──
  // "Next" (~y=710px)
  ['ck_bloat', 4, 83, 92, 7.5, 'ck_crave'],
  // Back
  ['ck_bloat', 0, 4, 14, 5, 'ck_digest'],

  // ── CK_CRAVE (g.png 390×844) ──
  // "Next"
  ['ck_crave', 4, 83, 92, 7.5, 'ck_done'],
  // Back
  ['ck_crave', 0, 4, 14, 5, 'ck_bloat'],

  // ── CK_DONE (h.png 422×905) ──
  // "Back to Home" button (~y=745px/905 = 82.3%)
  ['ck_done', 5, 78, 90, 6, 'home'],

  // ── INSIGHTS (l.png 390×1662) ──
  // Heart Health row (~y=565px/1662 = 34%) → LDL detail
  ['insights', 5, 33, 90, 4.5, 'ldl'],
  // Metabolic Health row (~y=1060px/1662 = 63.8%)
  ['insights', 5, 62, 90, 5, 'metabolic'],

  // ── METABOLIC (m.png 390×1459) ──
  // "< Back" top-left
  ['metabolic', 0, 1.5, 22, 4, 'insights'],
  // Any biomarker row → LDL as example (~y=545px/1459 = 37.4%)
  ['metabolic', 3, 36, 94, 4.5, 'ldl'],

  // ── LDL (n.png 390×844) ──
  // "< Heart Health" back link
  ['ldl', 0, 3, 32, 5, 'insights'],
];

// Screens where tab bar should hide (questionnaire flow)
const HIDE_TABS = new Set(['ck_sleep1','ck_sleep2','ck_digest','ck_bloat','ck_crave']);

// Tab ordering for directional transitions
const TAB_ORDER = ['home','checkin','habits','roadmap','insights'];

/*═══════════════════════════════════════════════════════════════
  STATE
═══════════════════════════════════════════════════════════════*/
let active = 'home';
let locked = false;

/*═══════════════════════════════════════════════════════════════
  IMAGE DATA (populated by build script)
═══════════════════════════════════════════════════════════════*/
const IMG = {};

/*═══════════════════════════════════════════════════════════════
  INITIALIZATION
═══════════════════════════════════════════════════════════════*/
function init() {
  const container = document.getElementById('panels');

  // Create panels
  for (const [id, cfg] of Object.entries(SCREENS)) {
    const panel = document.createElement('div');
    panel.className = 'pan' + (id === 'home' ? ' live' : '');
    panel.id = 'p-' + id;

    const img = document.createElement('img');
    img.alt = cfg.label;
    if (IMG[cfg.imgKey]) img.src = IMG[cfg.imgKey];
    panel.appendChild(img);

    // Bottom padding for tab bar
    const pad = document.createElement('div');
    pad.className = 'pan-pad';
    panel.appendChild(pad);

    cfg._el = panel;
    cfg._img = img;
    container.appendChild(panel);
  }

  // Place hotspots
  for (const [sid, x, y, w, h, target] of HOTSPOTS) {
    const scr = SCREENS[sid];
    if (!scr || !scr._el) continue;
    const hs = document.createElement('div');
    hs.className = 'hs';
    hs.style.cssText = `left:${x}%;top:${y}%;width:${w}%;height:${h}%`;
    hs.addEventListener('click', (e) => { e.stopPropagation(); nav(target); });
    scr._el.appendChild(hs);
  }

  syncTabs();
  syncCrumb();
}

/*═══════════════════════════════════════════════════════════════
  NAVIGATION
═══════════════════════════════════════════════════════════════*/
function nav(to, forcedDir) {
  if (locked || to === active) return;
  locked = true;

  const fromCfg = SCREENS[active];
  const toCfg = SCREENS[to];

  // Determine direction
  let dir = forcedDir;
  if (!dir) {
    // Check if target is ancestor → left
    let p = fromCfg.parent;
    while (p) { if (p === to) { dir = 'left'; break; } p = SCREENS[p]?.parent; }
    if (!dir) {
      // Tab root switch
      if (toCfg.root) {
        const fi = TAB_ORDER.indexOf(fromCfg.tab);
        const ti = TAB_ORDER.indexOf(toCfg.tab);
        dir = ti >= fi ? 'right' : 'left';
        if (fi === ti) dir = 'left'; // same tab, going back to root
      } else {
        dir = 'right'; // drilling in
      }
    }
  }

  const fromEl = fromCfg._el;
  const toEl = toCfg._el;

  // Reset scroll
  toEl.scrollTop = 0;

  // Position target off-screen (instant, no transition)
  toEl.classList.remove('go','live','out-l','out-r');
  toEl.classList.add(dir === 'right' ? 'out-r' : 'out-l');
  void toEl.offsetHeight; // force reflow

  // Enable transitions on both
  fromEl.classList.add('go');
  toEl.classList.add('go');

  // Animate
  requestAnimationFrame(() => {
    fromEl.classList.remove('live');
    fromEl.classList.add(dir === 'right' ? 'out-l' : 'out-r');
    toEl.classList.remove('out-l','out-r');
    toEl.classList.add('live');
  });

  active = to;

  // Tab bar visibility
  document.getElementById('tbar').classList.toggle('away', HIDE_TABS.has(to));

  syncTabs();
  syncCrumb();

  setTimeout(() => {
    locked = false;
    // Clean up transition class from previous panel
    fromEl.classList.remove('go');
    toEl.classList.remove('go');
  }, 450);
}

function goTab(tabId) {
  const root = Object.entries(SCREENS).find(([, c]) => c.tab === tabId && c.root)?.[0];
  if (root) nav(root);
}

function syncTabs() {
  const cur = SCREENS[active];
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('on', t.dataset.t === cur.tab);
  });
}

function syncCrumb() {}

/*═══════════════════════════════════════════════════════════════
  KEYBOARD NAV (for desktop testing)
═══════════════════════════════════════════════════════════════*/
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Backspace') {
    const parent = SCREENS[active]?.parent;
    if (parent) { e.preventDefault(); nav(parent); }
  }
});
</script>
